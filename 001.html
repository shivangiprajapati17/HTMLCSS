<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            box-sizing: border-box;
        }

        body{
            display: flex;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            background: linear-gradient(45deg, purple, blue);
        }

        .card{
            border-radius: 20px;
            background-color: white;
            box-shadow: 5px 5px 5px black;
            padding: 20px;
            position: relative;
        }
        
        input{
            border: 2px solid green;
            border-radius: 20px;
            width: 100%;
            padding: 10px;
        }

        label{
            font-weight: bolder;
            position: absolute;
            top: 25px;
            transition: .5s;
            left: 30px;
            background: white;
            padding: 3px;
        }

        input:focus + label{
            font-size: 10px;
            top: 15px;
        }


    </style>
</head>
<body>
    <div class="card">
        <input type="text">
        <label for="">USERNAME</label>
    </div>
</body>
</html>
