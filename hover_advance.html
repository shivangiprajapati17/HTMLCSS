<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            box-sizing: border-box;
        }
        body{
           display: flex;
           justify-content: center;
           align-items: center;
           min-height: 100vh; 
           background: linear-gradient(45deg,purple,pink);
        }
        .container{
            display: flex;
            gap: 20px;
        }
        .card{
            border: 5px solid purple;
            width: 210px;
            height: 360px;
            scale: .6;
            filter: grayscale(1);
            rotate: 20deg;
            transition: .2s;
        }
        .card:hover{
            scale: 1.2;
            filter: grayscale(0);
            rotate: 0deg;
        }
        .container:hover .card:not(:hover){
            scale: .4;
            filter: blur(5px) grayscale(1);

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="https://picsum.photos/200/350/" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/200/350/?2" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/200/350/?3" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/200/350/?" alt="">
        </div>

    </div>
</body>
</html>
